# Maker registry — canonical entities for this dataset.
#
# Schema: schema/operators.schema.json. Resolved from signals by
# gn_info_records; additions arrive by PR, never invented mid-run.
#
# Every corporate-event claim below is cited. Where sources are silent, the
# silence is recorded in `gaps` and nothing is inferred to fill it.

- id: mystery-ranch
  name: Mystery Ranch
  type: maker
  status: acquired
  country: US
  hq: "Bozeman, Montana"
  founded: 2000
  homepage: https://www.mysteryranch.com/
  founders:
    - Dana Gleason
    - Renee Sippel-Baker
  parent: yeti-holdings
  acquired_date: "2024-02-02"
  acquisition_price:
    amount: 36200000
    currency: USD
    confidence: medium
  predecessors:
    - Kletterwerks (founded 1975 by Dana Gleason)
    - Dana Design (sold to K2 in 1996)
  notes: >-
    Load-carriage packs across military, wildland fire, hunting and
    everyday-carry lines; known for its 3-ZIP access design. The company is
    the continuation of Dana Gleason's pack-design lineage: Kletterwerks
    (1975), later Dana Design, which was sold to K2 in 1996; Gleason and
    Renee Sippel-Baker launched Mystery Ranch in 2000.

    YETI Holdings announced a definitive agreement to acquire Mystery Ranch
    on 2024-01-31; the acquisition closed on 2024-02-02. The $36.2M figure
    is from business press reporting YETI's Q1 earnings call, not from
    YETI's own release — hence `confidence: medium`. YETI's release stated
    Mystery Ranch "will continue to operate out of Bozeman" and that teams
    and functions would integrate "over the next several months".

    On whether products or manufacturing changed after the acquisition,
    the sources we read are silent. We say nothing further. The community
    has its own views; this dataset does not launder them into fact.
  gaps:
    - "Dana Design's founding year (commonly cited as 1985) is not confirmed on any page we read. The maker's UK about page returned HTTP 403."
    - "Whether product lines or manufacturing changed pre- vs post-acquisition: no sourced statement found either way."
    - "The $36.2M price was not read at its primary source (YETI's SEC filing); it is taken from business press attributing the Q1 earnings call."
  sources:
    - url: https://investors.yeti.com/news/news-details/2024/YETI-Acquires-MYSTERY-RANCH/default.aspx
      title: "YETI® Acquires MYSTERY RANCH®"
      publisher: "YETI Holdings, Inc."
      date: "2024-01-31"
      kind: primary
      note: "Announcement of the definitive agreement; states continued Bozeman operations. Does not state the price."
    - url: https://www.outdoorsportswire.com/yeti-discloses-mystery-ranch-acquisition-price/
      title: "Yeti Discloses Mystery Ranch Acquisition Price"
      publisher: "Outdoor Sports Wire"
      kind: secondary
      note: "Reports $36.2M and a 2024-02-02 close, attributing YETI's Q1 earnings call."
    - url: https://www.fieldmag.com/articles/dana-gleason-interview-mystery-ranch-kletterwerks
      title: "Interview With Mystery Ranch Founder Dana Gleason"
      publisher: "Field Mag"
      kind: secondary
      note: "Dana Design sold to K2 in 1996; Kletterwerks revived 2010."
    - url: https://www.mossyoak.com/our-obsession/blogs/hunting-gear/built-the-mystery-ranch-story
      title: "BUILT: The Mystery Ranch Story"
      publisher: "Mossy Oak"
      kind: secondary
      note: "Kletterwerks founded 1975; lineage 'became Dana Designs and eventually MYSTERY RANCH in 2000'."

