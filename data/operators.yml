      title: "GORUCK Origins"
      publisher: GORUCK
      kind: primary
      note: "Founded 2008; founders Jason and Emily McCarthy."
    - url: https://www.goruck.com/products/gr1
      title: "GR1"
      publisher: GORUCK
      kind: primary
      note: "Construction details; 'Overbuilt in the USA'."
    - url: https://www.forbes.com/sites/amitchowdhry/2018/02/12/goruck-jason-mccarthy/
      title: "How A Special Forces Soldier Built A Multimillion-Dollar Backpack Brand"
      publisher: Forbes
      date: "2018-02-12"
      kind: secondary

- id: alpha-one-niner
  name: Alpha One Niner
  type: maker
  status: active
  aliases:
    - AON
  homepage: https://www.alphaoneniner.com/
  founders:
    - Helmie Ashiblie
  notes: >-
    A boutique carry brand founded by Helmie "HELM" Ashiblie, whose About
    page describes him as "a seasoned veteran of shooting sports, military
    life, fashion industry and product design & development". The brand name
    comes from his military call sign, from leading a reconnaissance platoon
    in the Singaporean Army. Production runs from the brand's own facility,
    "the Studio", in Saigon, Vietnam. The line runs to low-profile,
    tech-friendly carry — backpacks, pouches, dopp kits, organizers — with
    the EVADE backpack as its flagship.
  gaps:
    - "Founding year: not stated on any page we read. Unknown."
    - "Corporate HQ and country of registration: the About page names only the Saigon production studio. The `country` field is therefore omitted rather than guessed."
    - "The About page calls EVADE 'award winning'; specific award years appeared only in search snippets and are not cited here."
  sources:
    - url: https://www.alphaoneniner.com/pages/about
      title: "About Us"
      publisher: "Alpha One Niner"
      kind: primary

- id: filip-raboch
  name: Filip Raboch
  type: maker
  status: active
  homepage: https://filipraboch.com/
  founders:
    - Filip Raboch
  notes: >-
    A solo maker who hand-builds made-to-order backpacks and accessories,
    sold through a monthly raffle with lead times of roughly ten to twelve
    weeks. His About page states: "I made my first backpack in 2018, but I
    got fully into making gear in 2020." Prices are listed in euros.

    Recorded here under the spelling the maker himself uses. This project's
    founding brief said "Filip Robach"; no designer of that name exists, and
    the misspelling is corrected with the correction itself on the record
    (platform#223).
  gaps:
    - "Workshop location: search snippets say Prague, Czech Republic, but no page we read states it. Omitted rather than assumed."
    - "`founded` is omitted: 2018 is when he made his first backpack and 2020 when he went full-time; neither is a company founding date, and the sources do not offer one."
  sources:
