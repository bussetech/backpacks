- id: sample-by-matsuda
  name: Sample
  type: maker
  status: active
  aliases:
    - "Sample by Matsuda"
  country: US
  hq: "Beaverton, Oregon"
  homepage: https://samplebymatsuda.com/
  founders:
    - Dan Matsuda
  notes: >-
    The carry brand of designer Dan Matsuda, who was a product designer at
    Triple Aught Design from 2006 to 2018 and now builds in small batches in
    Beaverton, Oregon.

    Its products are named by an "Article" numbering convention — Article
    404, Article 252, Article_017. **Article is not a product line, and
    Sample is not one either: Sample is the brand, Article is how its models
    are numbered.** This project's founding brief described "SAMPLE and
    ARTICLE lines" as two parallel lines; that is wrong, and encoding it
    would have misrepresented the maker to readers who know better. The
    correction is on the record at platform#223.

    The legacy domain danmatsuda.com is now a landing page pointing at the
    Sample store.
  gaps:
    - "Founding year of the brand: not stated on any page we read."
    - "Most individual Article models (441, 498–501, and the historical 252 and 017) are unverified; only Article 404C was read in full."
  sources:
    - url: https://samplebymatsuda.com/
      title: "Sample"
      publisher: Sample
      kind: primary
    - url: https://www.carryology.com/interviews-regular/dan-matsuda-a-new-world-of-edc/
      title: "Dan Matsuda: a New World of EDC"
      publisher: Carryology
      date: "2020-07-01"
      kind: secondary
      note: "Confirms the TAD tenure 2006–2018 and describes the 'Article' numbering system."
