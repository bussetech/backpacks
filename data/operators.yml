- id: evergoods
  name: EVERGOODS
  type: maker
  status: active
  country: US
  hq: "Bozeman, Montana"
  founded: 2016
  homepage: https://evergoods.us/
  founders:
    - Jack Barley
    - Kevin Dee
  notes: >-
    Founded by Jack Barley and Kevin Dee, who came from GORUCK and
    Patagonia. The brand's own blog says the founders' experience spans
    "the likes of GORUCK and Patagonia" without assigning who came from
    where; the Barley→GORUCK and Dee→Patagonia mapping is from secondary
    press and is recorded as such. Launched via Kickstarter with two bags,
    the CPL24 and MPL30. Its stated aim is "crossover equipment" blending
    "the technical refinement of outdoor gear with all the ease and appeal
    of everyday wear". The current lineup is organized under the CIVIC,
    MOUNTAIN, ELEMENT and Transit families — these are genuine named lines.
  gaps:
    - "Formal incorporation date not verified; 2016 is anchored to the maker's launch blog post dated 2016-12-18 and its Kickstarter launch."
    - "Which founder worked for which company is maker-unconfirmed; only secondary press assigns the mapping."
    - "Specs for the original CPL24/MPL30/CTB40 (pre-rename) are not verified; the brand has re-tooled naming to CIVIC/MOUNTAIN nomenclature."
  sources:
    - url: https://evergoods.us/pages/origin
      title: "Our Story / Origin"
      publisher: EVERGOODS
      kind: primary
    - url: https://evergoods.us/blogs/evergoods-road-to-launch/building-evergoods
      title: "Building EVERGOODS"
      publisher: EVERGOODS
      date: "2016-12-18"
      kind: primary
      note: "Names both founders; anchors the 2016 launch."
    - url: https://www.gearpatrol.com/outdoors/a369800/evergoods-all-american-backpacks-goruck-patagonia/
      title: "All-New, All-American Backpacks, from Ex-Patagonia and GORUCK Designers"
      publisher: "Gear Patrol"
      kind: secondary
      note: "Source of the founder→employer mapping; not confirmed by the maker."

- id: goruck
  name: GORUCK
  type: maker
  status: active
  country: US
  founded: 2008
  homepage: https://www.goruck.com/
  founders:
    - Jason McCarthy
    - Emily McCarthy
  notes: >-
    Founded in 2008 by Jason McCarthy, a former US Army Special Forces
    soldier, with co-founder Emily McCarthy. The first product, the GR1,
    grew out of a "go bag" designed while Emily McCarthy worked in West
    Africa, and was refined over roughly two and a half years before launch.
    Construction is distinguished by 1000D CORDURA with softer 210D CORDURA
    on the back panel and shoulder straps, YKK zippers, MOLLE webbing, and
    US manufacturing — the GR1 page says "Overbuilt in the USA".
  gaps:
    - "HQ (Jacksonville Beach, Florida) appears only in secondary sources; not confirmed on a GORUCK-owned page."
    - "GR2 and GR3 specs could not be read: their product pages are JS-rendered and returned no spec table."
  sources:
