  # ---- corporate primary sources ------------------------------------------
  - id: yeti-investors
    type: investor-relations
    url: https://investors.yeti.com/
    publisher: YETI Holdings, Inc.
    scope: "Primary corporate record for the Mystery Ranch acquisition. Used only for corporate-event facts."
    status: manual
    robots:
      checked: "2026-07-09"
      notes: >-
        The acquisition press release was read directly. robots.txt for the
        investors.yeti.com subdomain was not probed, so no fetch posture is
