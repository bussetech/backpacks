    notes: "The parent company's own robots.txt at www.yeti.com does name AI crawlers (Claude-User, ClaudeBot, Anthropic-AI, GPTBot, OAI-SearchBot, PerplexityBot) with empty disallow directives. Recorded for accuracy; it grants nothing we act on, since this source is manual."
