# backpacks-signals-chain — when signals land on main, ask the control repo to
# resolve them. Mirror of kdc-signals-chain.yml (the template on the project
# side), retargeted at this project's deployment adapter.
#
# This repo already holds the gnome App credentials for deploy/claude, so the
# dispatch is minted here rather than in platform. Without those secrets the
# chain skips quietly and gn-backpacks-records can be dispatched by hand.
name: backpacks-signals-chain

on:
  # class: C (Conveyor) — advances on upstream completion (signals merged to
  # main), not on a clock. Deliberately no cron: the trigger IS the merge.
  push:
    branches: [main]
    paths:
      - "data/signals/**"
  workflow_dispatch: # manual re-fire of the chain

concurrency:
  group: backpacks-signals-chain
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  dispatch-records:
    if: ${{ github.repository_owner == 'bussetech' }}
    runs-on: ubuntu-latest
    steps:
      # The `secrets` context is invalid in step-level `if:` — detect first
      # (EPIC1-03 gotcha), then skip quietly when the App creds are absent.
      - name: Detect gnome App credentials
        id: creds
        env:
          APP_ID: ${{ secrets.GNOME_APP_ID }}
          APP_KEY: ${{ secrets.GNOME_APP_PRIVATE_KEY }}
        run: |
          if [ -n "$APP_ID" ] && [ -n "$APP_KEY" ]; then
            echo "have=true" >> "$GITHUB_OUTPUT"
          else
            echo "have=false" >> "$GITHUB_OUTPUT"
            echo "::notice::gnome App secrets not available — records chain not dispatched (run gn-backpacks-records manually)"
          fi

      - name: Mint records-dispatch token
        id: app-token
        if: steps.creds.outputs.have == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.GNOME_APP_ID }}
          private-key: ${{ secrets.GNOME_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: platform
          permission-contents: write

      - name: Dispatch gn-backpacks-records (backpacks-signals-merged)
        if: steps.creds.outputs.have == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          OWNER: ${{ github.repository_owner }}
        run: |
          gh api "repos/${OWNER}/platform/dispatches" \
            -f event_type=backpacks-signals-merged
